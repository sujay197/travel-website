<html>
<head>
<title> Tour and Travel Website</title>
<link rel="stylesheet" type="text/css" href="style1.css">
</head>
<body>
	<center><h1> <u>Travel Booking Form </u></h1>
	<form method="post" action="submit.html">
		<label>Passanger Contact Info:-</label>
		<input type="text" name="name" placeholder="Name"><br>
		<label>Contact No:-</label>
		<input type="text" name="phone" placeholder="Phone "><br>
		<label>Address:-</label>
		<input type="text" name="address" placeholder="Address"><br>
		<label>Email:-</label>
		<input type="text" name="Email" placeholder="Email"><br>
		<label>Total No. of Adults:-</label>
		<input type="text" name="total adults" placeholder="No. of Adults"><br>
		<label>Total No. of Children:-</label>
		<input type="text" name="total children" placeholder="No. of Children"><br>
		<label>Type of Travel:-</label>
		<input type="text" name="type travel" placeholder="Purpose"><br>
		<label>Destination:-</label>
		<input type="text" name="destination" placeholder="Destination"><br>
		<label>Estimated Budget of Trip:-</label>
		<input type="text" name="budget" placeholder="Budget"><br>
		<label>Activities:-</label>
		<input type="text" name="activities" placeholder="Spa, Golf, Excursion, Event Ticket, Shows, etc."><br>
		<label>Insured Travel Insurance:-</label>
		<input type="radio" name="Yes"> Yes <br>
		<input type="radio" name="Yes" class="group2"> No <br>
		<center><input type="submit" name="submit" href="submit.html" class="group1"></center></center>
	</form>
</body>
</html>
